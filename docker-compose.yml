services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - /Volumes/xhrrrrr_macmini副盘/quantlab/market:/data/market
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./web/dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped
